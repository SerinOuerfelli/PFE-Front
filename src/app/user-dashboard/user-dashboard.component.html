<body>
  <!-- Root wrapper with night-mode binding -->
  <div [class.night-mode]="themeService.nightMode$ | async" class="app-wrapper">

    <!-- Sidebar -->
    <div class="sidebar">
      <!-- HEADER -->
      <div class="sidebar-header">
        <img src="assets/biatlogo.png" alt="BIAT Logo">
        <div class="header-text">
          <h3>BIAT IT</h3>
          <p class="tagline">Smart Monitoring</p>
        </div>
      </div>

      <!-- Divider -->
      <hr class="sidebar-divider">
      <p class="section-title">Navigation</p>

      <!-- MENU -->
      <ul class="menu">
        <li (click)="setActive('Dashboard Overview'); loadContent('useroverview')"
          [class.active]="activeItem === 'Dashboard Overview'">
          <i class="fas fa-tachometer-alt icon"></i> Dashboard Overview
        </li>
        <li (click)="setActive('Equipment Overview '); loadContent('Equipment Overview ')"
          [class.active]="activeItem === 'Equipment Overview '">
          <i class="fas fa-cog icon"></i> Equipment Overview
        </li>
        <li (click)="setActive('ChatBot'); loadContent('chatbot')" [class.active]="activeItem === 'ChatBot'">
          <i class="fas fa-robot icon"></i> ChatBot
        </li>
        
      </ul>

      <hr class="sidebar-dividers">

      <!-- Bottom section -->
      <div class="sidebar-bottom">
        <!-- Theme toggle -->
      <label class="theme-switch">
        <span class="mode-label">☀️ Day</span>
        <input type="checkbox" (change)="toggleTheme()" [checked]="themeService.nightMode$ | async">
        <span class="slider"></span>
        <span class="mode-label">🌙 Night</span>
      </label>



        <hr class="sidebar-dividers">
        <p class="section-title">User Account</p>

        <!-- User info block -->
        <div class="user-info">
          <div class="avatar">{{ username?.charAt(0) }}</div>
          <div class="user-text">
            <p class="user-name">{{ username }}</p>
            <p class="user-email">{{ email }}</p>
          </div>
        </div>

        <hr class="sidebar-dividers">
        <button class="logout-btn" (click)="logout()">Logout</button>
      </div>
    </div>

    <!-- Right section (topbar + main content) -->
    <div class="right-section">
      <div class="topbar">
        <div class="ai-controls">
          <button (click)="onRetrain()" [disabled]="retrainLoading" class="retrain-btn">
            <i class="fas fa-brain"></i>
            {{ retrainLoading ? 'Learning...' : 'Retrain AI Model' }}
          </button>
          <span class="retrain-status" *ngIf="retrainMessage">{{ retrainMessage }}</span>
        </div>
      </div>

      <div class="main-content">
        <app-useroverview *ngIf="currentContent === 'useroverview'"></app-useroverview>
        <app-analytics *ngIf="currentContent === 'analytics'"></app-analytics>
        <app-rapports *ngIf="currentContent === 'rapports'"></app-rapports>
        <app-prediction *ngIf="currentContent === 'predictions'"></app-prediction>
        <app-equipment-overview *ngIf="currentContent === 'Equipment Overview '"></app-equipment-overview>
        <app-chatbot *ngIf="currentContent === 'chatbot'"></app-chatbot>
      </div>
    </div>
  </div>

  <!-- Floating Chat Bubble (hidden on full chatbot page) -->
  <app-chat-bubble *ngIf="currentContent !== 'chatbot'"></app-chat-bubble>
  
  <!-- Global Toast Notifications -->
  <app-toast-notifications></app-toast-notifications>
</body>
