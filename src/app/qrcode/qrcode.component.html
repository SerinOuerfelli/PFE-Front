<div class="auth-container">
  <!-- Top Corner Return Button -->
  <button class="btn-corner-return" (click)="goBack()" title="Back to Login">
    <span>←</span>
  </button>

  <!-- Left QR section -->
  <div class="welcome-section">
    <qrcode [qrdata]="qrData" [width]="220" [errorCorrectionLevel]="'M'"></qrcode>
    <p>Scan the code or enter verification below</p>
  </div>

  <!-- Right verification section -->
  <div class="form-section">
    <div class="box">
      <h2>Two-Factor Auth</h2>

      <div class="code-inputs">
        <input type="text" maxlength="1" [(ngModel)]="codeDigits[0]" (input)="moveFocus($event,0)" autofocus />
        <input type="text" maxlength="1" [(ngModel)]="codeDigits[1]" (input)="moveFocus($event,1)" />
        <input type="text" maxlength="1" [(ngModel)]="codeDigits[2]" (input)="moveFocus($event,2)" />
        <input type="text" maxlength="1" [(ngModel)]="codeDigits[3]" (input)="moveFocus($event,3)" />
        <input type="text" maxlength="1" [(ngModel)]="codeDigits[4]" (input)="moveFocus($event,4)" />
        <input type="text" maxlength="1" [(ngModel)]="codeDigits[5]" (input)="moveFocus($event,5)" />
      </div>

      <button (click)="verify()">Verify Secure Login</button>
      
      <div class="help-links">
        Having trouble? <span (click)="onNeedHelp()">Need Help?</span>
      </div>
    </div>
  </div>
</div>
