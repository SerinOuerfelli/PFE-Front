<div class="corporate-login-wrapper" [class.fade-out]="animateOut">

  <!-- Full Screen Background Branding -->
  <div class="brand-panel">
    <div class="brand-overlay"></div>
    <div class="brand-content">
      <img src="/assets/biatit.jpg" alt="BIAT Logo" class="brand-logo" />
      <h1 class="brand-title">Smart Monitor</h1>
      <p class="brand-subtitle">Secure AIoT Equipment Monitoring Platform</p>
    </div>
    <div class="brand-footer">
      <p>&copy; 2026 Banque Internationale Arabe de Tunisie</p>
    </div>
  </div>

  <!-- Right Panel overlapping with a perfect drop-shadow diagonal clip -->
  <div class="auth-panel-wrapper">
    <div class="auth-panel">
      
      <!-- Decorative Background Triangles -->
      <div class="bg-triangle shape-1"></div>
      <div class="bg-triangle shape-2"></div>
      <div class="bg-triangle shape-3"></div>

      <div class="auth-card">
        <div class="auth-header">
          <h2>Welcome Back</h2>
          <p>Please enter your credentials to securely access the dashboard.</p>
        </div>

        <div class="auth-form">
          <div class="form-group">
            <label for="email">Email Address</label>
            <div class="input-wrapper">
              <span class="input-icon">✉️</span>
              <input id="email" type="email" [(ngModel)]="email" placeholder="name@biat-it.com"
                (keyup.enter)="login()" />
            </div>
          </div>

          <div class="form-group">
            <label for="password">Password</label>
            <div class="input-wrapper">
              <span class="input-icon">🔒</span>
              <input id="password" type="password" [(ngModel)]="password" placeholder="Enter your password"
                (keyup.enter)="login()" />
            </div>
          </div>

          <button class="btn-corporate" (click)="login()">
            Secure Login
          </button>

          <div class="auth-links">
            <a href="javascript:void(0)" (click)="onNeedHelp()">Need Help? Contact IT Support</a>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>
